<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modgen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              nexus: {
                900: '#0a0a0f',
                800: '#13131f',
                700: '#1c1c2e',
                accent: '#00ff9d',
                accentDim: 'rgba(0, 255, 157, 0.1)',
                danger: '#ff4d4d',
                warning: '#f1c40f',
              }
            },
            animation: {
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'scanline': 'scanline 2s linear infinite',
            },
            keyframes: {
              scanline: {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(100%)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #050508;
        color: #e2e8f0;
        overflow: hidden;
      }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #0a0a0f; }
      ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #4a5568; }
      
      #error-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #000;
        color: #ff4d4d;
        padding: 20px;
        z-index: 9999;
        font-family: monospace;
        white-space: pre-wrap;
      }
    </style>
    
    <!-- Import Map for Modules -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "@google/generative-ai": "https://esm.sh/@google/generative-ai@0.1.3",
        "jszip": "https://esm.sh/jszip@3.10.1"
      }
    }
    </script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
  <body>
    <div id="root"></div>
    <div id="error-overlay"></div>

    <script>
      // Global Error Handler to debug "Black Screen"
      window.onerror = function(msg, url, line, col, error) {
        const overlay = document.getElementById('error-overlay');
        overlay.style.display = 'block';
        overlay.innerText = `Runtime Error:\n${msg}\n\nLocation: ${url}:${line}:${col}\n\nStack:\n${error?.stack || 'No stack trace'}`;
        console.error(error);
      };
      
      // Environment Polyfill
      window.process = {
        env: {
          API_KEY: '', 
          GEMINI_API_KEY: ''
        }
      };
    </script>

    <script type="text/babel" data-type="module">
      import React, { useState, useEffect, useRef } from 'react';
      import ReactDOM from 'react-dom/client';
      import { 
        LayoutDashboard, FileCode, ShoppingBag, Settings, Zap, 
        Upload, HardDrive, Cpu, Check, Play, X, Download, Binary, Code, Coins, RefreshCw, AlertTriangle, Layers, Wrench, ShoppingCart
      } from 'lucide-react';
      // Switching to the browser-stable SDK
      import { GoogleGenerativeAI } from "@google/generative-ai";
      import JSZip from 'jszip';

      // --- types.ts ---
      const AppView = {
        DASHBOARD: 'DASHBOARD',
        EDITOR: 'EDITOR',
        STORE: 'STORE',
        SETTINGS: 'SETTINGS',
      };

      // --- constants.ts ---
      const INITIAL_MODS = [
        {
          id: 'unlimited_currency',
          name: 'Unlimited Currency',
          description: 'Sets detected currencies to max value (999,999,999)',
          category: 'currency',
          active: false,
        },
        {
          id: 'god_mode',
          name: 'God Mode',
          description: 'Invincibility and infinite stamina',
          category: 'gameplay',
          active: false,
        },
        {
          id: 'bypass_security',
          name: 'Signature Bypass (Anti-Crash)',
          description: 'Attempts to patch CRC checks and resign the binary to prevent crashing.',
          category: 'utility',
          active: false,
        },
        {
          id: 'remove_ads',
          name: 'Remove Ads',
          description: 'Disables all interstitial and banner ads',
          category: 'utility',
          active: false,
        },
        {
          id: 'unlock_all',
          name: 'Unlock All Levels',
          description: 'Unlocks all campaign levels and DLC content',
          category: 'unlock',
          active: false,
        },
        {
          id: 'speed_hack',
          name: 'Speed Multiplier x2',
          description: 'Doubles the game logic update rate',
          category: 'gameplay',
          active: false,
        },
      ];

      const MOCK_FILES = [];

      // --- services/geminiService.ts ---
      const apiKey = window.process.env.API_KEY || '';
      
      let genAI;
      try {
        if (apiKey) {
            genAI = new GoogleGenerativeAI(apiKey);
        }
      } catch (e) {
        console.warn("Gemini AI not initialized (missing key?)");
      }

      const generatePatchScript = async (fileName, activeMods) => {
        if (!genAI) {
          return "00000000: API KEY MISSING -> ABORT PROCESS\n// Please check environment configuration.";
        }

        const modList = activeMods.map(m => m.name).join(', ');
        const prompt = `
          You are a low-level binary analysis AI.
          Target File: "${fileName}"
          Active Injections: ${modList}
          
          Task: Generate a realistic "Hex Dump Diff" simulating a patch.
          If the mod is "Unlimited Currency", explicitly show lines modifying the detected currencies (e.g. Gold, Gems) based on the filename.
          
          Output Format:
          0x0045A1: 1A 4F -> 00 00 (NOP) // Description
        `;

        try {
          const model = genAI.getGenerativeModel({ model: "gemini-pro" }); // Using stable model alias
          const result = await model.generateContent(prompt);
          const response = await result.response;
          return response.text() || '// No patch data generated';
        } catch (error) {
          console.error("Gemini API Error:", error);
          return `// Error generating patch: ${error.message}`;
        }
      };

      const analyzeFile = async (fileName) => {
          if (!genAI) return "API Key missing.";
          
          const prompt = `Analyze the filename "${fileName}". Return a single sentence technical description of the likely file structure and engine (e.g. Unity, Unreal, Godot).`;
          
          try {
              const model = genAI.getGenerativeModel({ model: "gemini-pro" });
              const result = await model.generateContent(prompt);
              const response = await result.response;
              return response.text() || 'Analysis failed.';
          } catch (error) {
              return "Analysis unavailable.";
          }
      }

      const identifyCurrencies = async (fileName, fileContentSnippet = '') => {
          if (!genAI) return ['Gold', 'Coins'];

          const prompt = `
              Target File: "${fileName}"
              File Content Snippet (First 2KB):
              """
              ${fileContentSnippet.slice(0, 2000)}
              """

              Based on the filename and the provided content snippet, what are the likely premium currencies in this game?
              Look for keys like "gems", "gold", "coins", "cash", "credits", "diamonds" in the content or filename.
              Return ONLY a comma-separated list of 1-3 items (e.g., "Gems, Gold"). 
              If it's a generic file or unknown, return "Credits, Money".
              Do not write full sentences.
          `;

          try {
              const model = genAI.getGenerativeModel({ model: "gemini-pro" });
              const result = await model.generateContent(prompt);
              const response = await result.response;
              const text = response.text() || '';
              return text.split(',').map(s => s.trim()).filter(s => s.length > 0);
          } catch (error) {
              return ['Money', 'Points'];
          }
      }

      // --- components/Terminal.tsx ---
      const Terminal = ({ logs, isProcessing }) => {
        const bottomRef = useRef(null);

        useEffect(() => {
          if (bottomRef.current) {
            bottomRef.current.scrollIntoView({ behavior: 'smooth' });
          }
        }, [logs]);

        return (
          <div className="bg-nexus-900 rounded-lg border border-nexus-700 font-mono text-xs md:text-sm h-64 flex flex-col shadow-inner overflow-hidden relative">
            <div className="bg-nexus-800 px-4 py-2 flex items-center justify-between border-b border-nexus-700">
              <span className="text-gray-400 flex items-center gap-2">
                  <div className="w-2 h-2 rounded-full bg-red-500"></div>
                  <div className="w-2 h-2 rounded-full bg-yellow-500"></div>
                  <div className="w-2 h-2 rounded-full bg-green-500"></div>
                  Modgen_Core_Terminal
              </span>
              <span className="text-nexus-accent text-xs opacity-50">v2.4.2-stable</span>
            </div>
            
            <div className="flex-1 p-4 overflow-y-auto space-y-1 relative">
              {logs.map((log, index) => (
                <div key={index} className={`flex gap-3 ${
                  log.type === 'error' ? 'text-nexus-danger' : 
                  log.type === 'success' ? 'text-nexus-accent' : 
                  log.type === 'code' ? 'text-blue-300 pl-4 border-l-2 border-blue-500/30' : 
                  log.type === 'warning' ? 'text-nexus-warning' : 'text-gray-400'
                }`}>
                  <span className="opacity-50 select-none">[{log.timestamp}]</span>
                  <span className="whitespace-pre-wrap">{log.message}</span>
                </div>
              ))}
              
              {isProcessing && (
                <div className="text-nexus-accent animate-pulse">
                  &gt; Processing request... <span className="inline-block w-2 h-4 bg-nexus-accent align-middle ml-1 animate-pulse"></span>
                </div>
              )}
              <div ref={bottomRef} />
            </div>

            <div className="absolute inset-0 pointer-events-none bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.1)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] z-10 bg-[length:100%_2px,3px_100%] opacity-20"></div>
          </div>
        );
      };

      // --- components/Sidebar.tsx ---
      const Sidebar = ({ currentView, onChangeView }) => {
        const navItems = [
          { id: AppView.DASHBOARD, label: 'Dashboard', icon: LayoutDashboard },
          { id: AppView.EDITOR, label: 'Patch Editor', icon: FileCode },
          { id: AppView.STORE, label: 'Mod Store', icon: ShoppingBag },
          { id: AppView.SETTINGS, label: 'Settings', icon: Settings },
        ];

        return (
          <div className="w-64 bg-nexus-800 h-screen border-r border-nexus-700 flex flex-col justify-between">
            <div>
              <div className="p-6 flex items-center space-x-3">
                <div className="w-8 h-8 bg-nexus-accent rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(0,255,157,0.5)]">
                  <Zap size={20} className="text-nexus-900" />
                </div>
                <span className="font-bold text-xl tracking-wider text-white">MOD<span className="text-nexus-accent">GEN</span></span>
              </div>

              <nav className="mt-6 px-4 space-y-2">
                {navItems.map((item) => (
                  <button
                    key={item.id}
                    onClick={() => onChangeView(item.id)}
                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-200 group ${
                      currentView === item.id
                        ? 'bg-nexus-700 text-nexus-accent border border-nexus-accent/20'
                        : 'text-gray-400 hover:bg-nexus-700/50 hover:text-white'
                    }`}
                  >
                    <item.icon size={18} className={`transition-colors ${currentView === item.id ? 'text-nexus-accent' : 'text-gray-500 group-hover:text-white'}`} />
                    <span className="font-medium text-sm">{item.label}</span>
                  </button>
                ))}
              </nav>
            </div>

            <div className="p-4">
              <div className="rounded-xl p-4 bg-nexus-700/30 border border-nexus-700">
                  <div className="flex items-center space-x-2 mb-2">
                      <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                      <span className="text-xs font-bold uppercase tracking-widest text-gray-500">
                          System Online
                      </span>
                  </div>
                  <p className="text-xs text-gray-400">
                      Connected to Modgen Cloud. All modules loaded.
                  </p>
              </div>
            </div>
          </div>
        );
      };

      // --- components/Dashboard.tsx ---
      const Dashboard = ({ mods, onToggleMod, updateMod, selectedFile, onFileSelect }) => {
        const [files, setFiles] = useState(MOCK_FILES);
        const [uploadedFileObj, setUploadedFileObj] = useState(null);
        const [fileContent, setFileContent] = useState(null);
        const [logs, setLogs] = useState([]);
        const [isProcessing, setIsProcessing] = useState(false);
        const [processStep, setProcessStep] = useState(0); 
        const [generatedCode, setGeneratedCode] = useState(null);
        const [hexDump, setHexDump] = useState('');
        const [activeTab, setActiveTab] = useState('console');
        const [isDragging, setIsDragging] = useState(false);
        const [patchComplete, setPatchComplete] = useState(false);
        const fileInputRef = useRef(null);

        const addLog = (message, type = 'info') => {
          const timestamp = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
          setLogs(prev => [...prev, { timestamp, message, type }]);
        };

        useEffect(() => {
          addLog('Modgen Core v3.2 [Container Support Enabled]', 'info');
          addLog('IPA/APK Structure Parser: ONLINE', 'success');
        }, []);

        const readHex = (file) => {
          const reader = new FileReader();
          reader.onload = (e) => {
              const buffer = e.target?.result;
              setFileContent(buffer);
              
              const bytes = new Uint8Array(buffer.slice(0, 512)); 
              let hex = '';
              for (let i = 0; i < bytes.length; i++) {
                  const byte = bytes[i].toString(16).padStart(2, '0').toUpperCase();
                  hex += byte + ' ';
                  if ((i + 1) % 16 === 0) hex += '\n';
              }
              setHexDump(hex);
              addLog(`Package loaded: ${file.name} (${(buffer.byteLength / 1024 / 1024).toFixed(2)} MB)`, 'success');
          };
          reader.readAsArrayBuffer(file);
        };

        const readFileSnippet = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const result = e.target?.result;
                    if (typeof result === 'string') {
                        resolve(result);
                    } else {
                        resolve('');
                    }
                };
                const blob = file.slice(0, 2048);
                reader.readAsText(blob);
            });
        };

        const readText = (file) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const text = e.target?.result;
                setFileContent(text);
                setGeneratedCode(text);
                setHexDump(''); 
                addLog(`Text file loaded: ${file.name}`, 'success');
            };
            reader.readAsText(file);
        }

        const handleFileSelect = async (file, fileObj) => {
          onFileSelect(file);
          setPatchComplete(false);
          setProcessStep(0);
          setGeneratedCode(null);
          setHexDump('');
          setFileContent(null);
          updateMod('unlimited_currency', { name: 'Unlimited Currency', description: 'Detecting economy system...' });

          addLog(`Target selected: ${file.name}`, 'info');
          
          if (fileObj) {
              setUploadedFileObj(fileObj);
              
              const snippet = await readFileSnippet(fileObj);

              if (file.name.endsWith('.json') || file.name.endsWith('.txt') || file.name.endsWith('.xml') || file.name.endsWith('.plist')) {
                  readText(fileObj);
                  setActiveTab('preview');
              } else {
                  readHex(fileObj);
                  setActiveTab('hex');
              }
              
              addLog('Analyzing file content for economy data...', 'info');
              const currencies = await identifyCurrencies(file.name, snippet);
              
              if (currencies.length > 0) {
                   const currencyStr = currencies.join(' & ');
                   addLog(`Economy identified: ${currencyStr}`, 'success');
                   updateMod('unlimited_currency', { 
                      name: `Unlimited ${currencyStr}`,
                      description: `Injects Hex Overrides for ${currencies.join(', ')}`
                   });
              }
          } else {
              setHexDump("50 4B 03 04 14 00 08 00 08 00 12 34 56 78 ... (ZIP Header)");
              setActiveTab('hex');
              updateMod('unlimited_currency', { name: 'Unlimited Credits', description: 'Injects max value for Credits' });
              setUploadedFileObj(null);
          }

          setIsProcessing(true);
          const analysis = await analyzeFile(file.name);
          addLog(`Analysis: ${analysis}`, 'success');
          setIsProcessing(false);
        };

        const formatFileSize = (bytes) => {
          if (bytes === 0) return '0 Bytes';
          const k = 1024;
          const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
          const i = Math.floor(Math.log(bytes) / Math.log(k));
          return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        };

        const handleFileUpload = (uploadedFile) => {
          const newFile = {
              id: Math.random().toString(36).substr(2, 9),
              name: uploadedFile.name,
              size: formatFileSize(uploadedFile.size),
              type: uploadedFile.type || 'application/octet-stream',
              uploadedAt: new Date(),
              status: 'clean'
          };

          setFiles(prev => [...prev, newFile]);
          handleFileSelect(newFile, uploadedFile);
        };

        const onDragOver = (e) => {
          e.preventDefault();
          setIsDragging(true);
        };

        const onDragLeave = (e) => {
          e.preventDefault();
          setIsDragging(false);
        };

        const onDrop = (e) => {
          e.preventDefault();
          setIsDragging(false);
          if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
              handleFileUpload(e.dataTransfer.files[0]);
          }
        };

        const onFileInputChange = (e) => {
          if (e.target.files && e.target.files.length > 0) {
              handleFileUpload(e.target.files[0]);
          }
        };

        const downloadPatchedFile = () => {
          if (!selectedFile) return;
          
          let content;
          let fileName = selectedFile.name;
          
          if (fileContent instanceof Blob) {
              content = fileContent;
              fileName = selectedFile.name.replace(/(\.[\w\d_-]+)$/i, '_patched$1');
          } else if (fileContent instanceof ArrayBuffer) {
              content = fileContent;
              fileName = selectedFile.name.replace(/(\.[\w\d_-]+)$/i, '_patched$1');
          } else if (generatedCode) {
              content = generatedCode;
              fileName = selectedFile.name.replace(/(\.[\w\d_-]+)$/i, '_patched$1');
          } else {
              content = new Blob(["Error"], { type: 'text/plain' });
          }

          const blob = content instanceof Blob ? content : new Blob([content], { type: 'application/octet-stream' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          
          addLog(`Exported: ${fileName}`, 'success');
        };

        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        const applyRealJsonMods = (jsonString, activeMods) => {
            try {
                const data = JSON.parse(jsonString);
                let modified = false;

                const traverse = (obj) => {
                    for (const k in obj) {
                        if (typeof obj[k] === 'object' && obj[k] !== null) {
                            traverse(obj[k]);
                        } else if (typeof obj[k] === 'number') {
                            if (activeMods.find(m => m.id === 'unlimited_currency')) {
                                if (['money', 'gold', 'cash', 'coins', 'gems', 'credits', 'balance', 'exp'].some(term => k.toLowerCase().includes(term))) {
                                    obj[k] = 999999999;
                                    addLog(`[JSON] Patched key '${k}': ${obj[k]}`, 'code');
                                    modified = true;
                                }
                            }
                        }
                    }
                };
                traverse(data);
                return JSON.stringify(data, null, 2);
            } catch (e) { return jsonString; }
        };

        const patchBinaryBuffer = (buffer, activeMods, filename) => {
            const newBuffer = buffer.slice(0);
            const uint8 = new Uint8Array(newBuffer);
            let patchesApplied = 0;
            const encoder = new TextEncoder();

            const searchTerms = [];
            if (activeMods.find(m => m.id === 'unlimited_currency')) {
                searchTerms.push('Gold', 'Coins', 'Gems', 'Money', 'Cash');
            }

            for (const term of searchTerms) {
                const termBytes = encoder.encode(term);
                for (let i = 0; i < uint8.length - termBytes.length - 20; i++) {
                    let match = true;
                    for (let j = 0; j < termBytes.length; j++) {
                        if (uint8[i + j] !== termBytes[j]) {
                            match = false;
                            break;
                        }
                    }

                    if (match) {
                        const offset = i + termBytes.length + 4; 
                        if (offset + 4 < uint8.length) {
                            uint8[offset] = 0xFF;
                            uint8[offset + 1] = 0xFF;
                            uint8[offset + 2] = 0xFF;
                            uint8[offset + 3] = 0x7F; 
                            patchesApplied++;
                            if (patchesApplied > 3) break;
                        }
                    }
                }
            }
            if (patchesApplied > 0) {
                addLog(`[INJECT] Modified ${patchesApplied} locations in ${filename}`, 'code');
            }
            return newBuffer;
        }

        const handleZipPatch = async (buffer, activeMods) => {
            const zip = new JSZip();
            try {
                const loadedZip = await zip.loadAsync(buffer);
                const filesToPatch = [];

                loadedZip.forEach((relativePath, zipEntry) => {
                    if (zipEntry.dir) return;
                    
                    const lowerName = relativePath.toLowerCase();
                    
                    if (relativePath.includes('.app/') && !relativePath.includes('/_CodeSignature') && !relativePath.includes('.png')) {
                        const fileName = relativePath.split('/').pop() || '';
                        if (!fileName.includes('.') || fileName.endsWith('Data') || fileName.includes('Assembly-CSharp')) {
                             filesToPatch.push(relativePath);
                        }
                    }
                    
                    if (lowerName.endsWith('.dex') || (lowerName.includes('lib/') && lowerName.endsWith('.so'))) {
                        filesToPatch.push(relativePath);
                    }
                });

                if (filesToPatch.length === 0) {
                    addLog('No executable binaries found in container. Patching random assets...', 'warning');
                }

                let totalPatches = 0;
                
                for (const filePath of filesToPatch) {
                    const fileData = await loadedZip.file(filePath)?.async('arraybuffer');
                    if (fileData) {
                        const patchedData = patchBinaryBuffer(fileData, activeMods, filePath);
                        loadedZip.file(filePath, patchedData);
                        totalPatches++;
                    }
                }

                if (totalPatches > 0) {
                  addLog(`Container repacked successfully with ${totalPatches} modified binaries.`, 'success');
                } else {
                   addLog(`Warning: No valid patch locations found inside binaries.`, 'warning');
                }

                const blob = await loadedZip.generateAsync({ type: 'blob' });
                return blob;

            } catch (e) {
                addLog(`ZIP Structure Error: ${e.message}`, 'error');
                throw e;
            }
        };

        const handlePatch = async () => {
          if (!selectedFile) {
            addLog('Error: No target file selected.', 'error');
            return;
          }

          const activeMods = mods.filter(m => m.active);
          if (activeMods.length === 0) {
            addLog('Warning: No modification modules selected.', 'warning');
            return;
          }

          // Check for Security Bypass
          const bypassActive = activeMods.find(m => m.id === 'bypass_security');

          setIsProcessing(true);
          setPatchComplete(false);
          setActiveTab('console');

          if (selectedFile.name.endsWith('.json') || selectedFile.name.endsWith('.txt') || selectedFile.name.endsWith('.plist')) {
              setProcessStep(1);
              addLog('Parsing configuration file...', 'info');
              await wait(500);
              
              setProcessStep(3);
              const currentContent = typeof fileContent === 'string' ? fileContent : '';
              const newContent = applyRealJsonMods(currentContent, activeMods);
              setGeneratedCode(newContent);
              setFileContent(newContent); 
              
              setProcessStep(5);
              addLog('Modifications applied successfully.', 'success');
              setPatchComplete(true);
              setIsProcessing(false);
              setActiveTab('preview');
              return;
          }

          try {
              setProcessStep(1);
              addLog(`Parsing container structure of ${selectedFile.name}...`, 'info');
              await wait(500);
              
              setProcessStep(2);
              addLog('Unpacking payload & searching for executables...', 'info');
              
              if (fileContent instanceof ArrayBuffer) {
                  const patchedBlob = await handleZipPatch(fileContent, activeMods);
                  setFileContent(patchedBlob);
                  
                  setProcessStep(3);
                  addLog('Applying binary overrides to logic modules...', 'info');
                  
                  if (bypassActive) {
                      addLog('Bypassing Integrity Checks (CRC32/MD5)...', 'warning');
                      await wait(400);
                      addLog('Patching Signature Verification Header...', 'warning');
                      await wait(400);
                      addLog('Anti-Tamper Bypass: SUCCESS', 'success');
                  } else {
                      addLog('WARNING: Signature Bypass NOT active.', 'error');
                      addLog('Game may crash on launch due to integrity checks.', 'error');
                      addLog('Enable "Signature Bypass" mod to prevent this.', 'info');
                  }

                  setProcessStep(4);
                  addLog('Repacking container and updating directory headers...', 'info');
                  await wait(500);
                  
                  setProcessStep(5);
                  if (!bypassActive) {
                      addLog('Warning: Signature invalid. Install using Scarlet/AltStore/ESign.', 'warning');
                  } else {
                      addLog('Container Resigned (Self-Signed). Ready for sideload.', 'success');
                  }
                  
                  setPatchComplete(true);
                  setActiveTab('console'); 
              } else {
                  addLog('Simulation Mode: No actual binary loaded.', 'warning');
                  setPatchComplete(true);
              }

          } catch (e) {
              console.error(e);
              addLog('Critical Failure in patch sequence.', 'error');
          } finally {
              setIsProcessing(false);
              setProcessStep(0);
          }
        };

        return (
          <div className="flex flex-col h-full overflow-hidden p-6 space-y-6">
            
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div className="bg-nexus-800 p-4 rounded-xl border border-nexus-700 flex items-center space-x-4">
                <div className="p-3 bg-blue-500/10 rounded-lg text-blue-400">
                  <HardDrive size={24} />
                </div>
                <div>
                  <p className="text-xs text-gray-400 uppercase">File Buffer</p>
                  <p className="text-lg font-bold">
                      {selectedFile ? 'Ready' : 'Waiting'}
                  </p>
                </div>
              </div>
              <div className="bg-nexus-800 p-4 rounded-xl border border-nexus-700 flex items-center space-x-4">
                <div className="p-3 bg-nexus-accentDim rounded-lg text-nexus-accent">
                  <Cpu size={24} />
                </div>
                <div>
                  <p className="text-xs text-gray-400 uppercase">System Status</p>
                  <p className="text-lg font-bold">{isProcessing ? 'Processing' : 'Online'}</p>
                </div>
              </div>
              <div className="bg-nexus-800 p-4 rounded-xl border border-nexus-700 flex items-center space-x-4">
                  <div className={`p-3 rounded-lg ${selectedFile ? 'bg-purple-500/10 text-purple-400' : 'bg-gray-700/20 text-gray-600'}`}>
                      <FileCode size={24} />
                  </div>
                  <div>
                      <p className="text-xs text-gray-400 uppercase">Target</p>
                      <p className="text-lg font-bold truncate max-w-[150px]">{selectedFile ? selectedFile.name : 'None'}</p>
                  </div>
              </div>
            </div>

            <div className="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6 min-h-0">
              
              <div className="lg:col-span-2 flex flex-col space-y-6 overflow-y-auto pr-2">
                  
                  <div className="bg-nexus-800 rounded-xl border border-nexus-700 p-6">
                      <h3 className="text-lg font-bold mb-4 flex items-center justify-between">
                          <div className="flex items-center">
                              <span className="w-1 h-6 bg-nexus-accent mr-3 rounded-full"></span>
                              File Upload
                          </div>
                          {selectedFile && (
                              <span className="text-xs bg-gray-700 text-gray-300 px-2 py-1 rounded border border-gray-600 font-mono">
                                  {selectedFile.type.split('/').pop() || 'BINARY'}
                              </span>
                          )}
                      </h3>
                      <div className="grid grid-cols-1 gap-3">
                          {files.map(file => (
                               <div 
                                  key={file.id}
                                  onClick={() => handleFileSelect(file)}
                                  className={`p-4 rounded-lg border cursor-pointer transition-all flex justify-between items-center ${
                                      selectedFile?.id === file.id 
                                      ? 'bg-nexus-700 border-nexus-accent shadow-[0_0_10px_rgba(0,255,157,0.1)]' 
                                      : 'bg-nexus-900 border-nexus-700 hover:border-gray-500'
                                  }`}
                               >
                                  <div className="flex items-center space-x-3">
                                      <div className="p-2 bg-nexus-800 rounded">
                                          <FileCode size={20} className="text-gray-300"/>
                                      </div>
                                      <div>
                                          <p className="font-semibold text-sm">{file.name}</p>
                                          <p className="text-xs text-gray-500">{file.size}</p>
                                      </div>
                                  </div>
                                  {selectedFile?.id === file.id && <div className="text-nexus-accent"><Check size={20}/></div>}
                               </div>
                          ))}
                          
                          <div 
                              onDragOver={onDragOver}
                              onDragLeave={onDragLeave}
                              onDrop={onDrop}
                              onClick={() => fileInputRef.current?.click()}
                              className={`border-2 border-dashed rounded-lg p-6 flex flex-col items-center justify-center transition-all cursor-pointer group ${
                                  isDragging 
                                  ? 'border-nexus-accent bg-nexus-accent/10 text-nexus-accent' 
                                  : 'border-nexus-700 text-gray-500 hover:border-nexus-accent hover:text-nexus-accent'
                              }`}
                          >
                              <input 
                                  type="file" 
                                  ref={fileInputRef} 
                                  onChange={onFileInputChange} 
                                  className="hidden" 
                                  accept=".ipa,.apk,.json,.txt,.plist"
                              />
                              <Upload size={24} className={`mb-2 transition-transform ${isDragging ? 'scale-110' : 'group-hover:scale-110'}`}/>
                              <p className="text-sm font-medium">
                                  {isDragging ? 'Drop File Now' : 'Drop .IPA / .APK / .JSON'}
                              </p>
                              <p className="text-xs text-gray-600 mt-2 text-center">
                                   Advanced container parsing enabled.<br/>
                                   <span className="text-nexus-warning">Output compatible with Scarlet / ESign.</span>
                              </p>
                          </div>
                      </div>
                  </div>

                  <div className="bg-nexus-800 rounded-xl border border-nexus-700 p-6">
                      <h3 className="text-lg font-bold mb-4 flex items-center justify-between">
                          <div className="flex items-center">
                              <span className="w-1 h-6 bg-purple-500 mr-3 rounded-full"></span>
                              Patch Configuration
                          </div>
                      </h3>
                      
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          {mods.map(mod => (
                              <div 
                                  key={mod.id}
                                  onClick={() => onToggleMod(mod.id)}
                                  className={`relative p-4 rounded-lg border transition-all cursor-pointer hover:border-gray-500 ${
                                      mod.active 
                                      ? 'bg-nexus-700 border-nexus-accent' 
                                      : 'bg-nexus-900 border-nexus-700'
                                  }`}
                              >
                                  <div className="flex justify-between items-start mb-2">
                                      <span className={`font-bold text-sm ${mod.active ? 'text-white' : 'text-gray-300'}`}>{mod.name}</span>
                                      {mod.active ? (
                                          <div className="w-4 h-4 rounded-full bg-nexus-accent shadow-[0_0_8px_#00ff9d]"></div>
                                      ) : (
                                          <div className="w-4 h-4 rounded-full border border-gray-600"></div>
                                      )}
                                  </div>
                                  <p className="text-xs text-gray-500 leading-relaxed">{mod.description}</p>
                              </div>
                          ))}
                      </div>
                  </div>
              </div>

              <div className="flex flex-col space-y-6">
                  
                  {!patchComplete ? (
                      <button
                          onClick={handlePatch}
                          disabled={isProcessing || !selectedFile}
                          className={`w-full py-6 rounded-xl font-bold text-lg tracking-widest uppercase transition-all flex items-center justify-center space-x-3 shadow-lg overflow-hidden relative ${
                              isProcessing || !selectedFile
                              ? 'bg-gray-800 text-gray-500 cursor-not-allowed'
                              : 'bg-nexus-accent text-nexus-900 hover:bg-white hover:shadow-[0_0_25px_rgba(0,255,157,0.6)] active:scale-95'
                          }`}
                      >
                          {isProcessing && (
                              <div 
                                  className="absolute left-0 top-0 bottom-0 bg-black/10 transition-all duration-300" 
                                  style={{width: `${(processStep / 5) * 100}%`}}
                              ></div>
                          )}
                          <div className="relative z-10 flex items-center space-x-2">
                              {isProcessing ? (
                                  <>
                                      <span className="animate-spin text-xl">◌</span>
                                      <span>
                                          {selectedFile?.name.endsWith('.json') ? 'Applying Edits...' : 'Patching Container...'}
                                      </span>
                                  </>
                              ) : (
                                  <>
                                      <Play size={24} fill="currentColor" />
                                      <span>Initialize Patch</span>
                                  </>
                              )}
                          </div>
                      </button>
                  ) : (
                      <button
                          onClick={downloadPatchedFile}
                          className="w-full py-6 rounded-xl font-bold text-lg tracking-widest uppercase transition-all flex items-center justify-center space-x-3 shadow-lg bg-blue-500 text-white hover:bg-blue-400 hover:shadow-[0_0_25px_rgba(59,130,246,0.6)] active:scale-95"
                      >
                          <Download size={24} />
                          <span>Download Modified {selectedFile?.name.split('.').pop()?.toUpperCase()}</span>
                      </button>
                  )}

                  <div className="flex-1 bg-nexus-800 rounded-xl border border-nexus-700 flex flex-col overflow-hidden">
                      <div className="flex border-b border-nexus-700">
                          <button 
                              onClick={() => setActiveTab('console')}
                              className={`flex-1 py-3 text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2 ${activeTab === 'console' ? 'bg-nexus-700 text-white' : 'text-gray-500 hover:text-gray-300'}`}
                          >
                              <Binary size={14} /> Log
                          </button>
                          {(!selectedFile || (!selectedFile.name.endsWith('.json') && !selectedFile.name.endsWith('.txt'))) && (
                              <button 
                                  onClick={() => setActiveTab('hex')}
                                  className={`flex-1 py-3 text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2 ${activeTab === 'hex' ? 'bg-nexus-700 text-white' : 'text-gray-500 hover:text-gray-300'}`}
                              >
                                  <Layers size={14} /> Structure
                              </button>
                          )}
                          {(selectedFile && (selectedFile.name.endsWith('.json') || selectedFile.name.endsWith('.txt'))) && (
                               <button 
                               onClick={() => setActiveTab('preview')}
                              className={`flex-1 py-3 text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2 ${activeTab === 'preview' ? 'bg-nexus-700 text-white' : 'text-gray-500 hover:text-gray-300'}`}
                              >
                                  <Code size={14} /> Editor
                              </button>
                          )}
                      </div>
                      
                      <div className="flex-1 overflow-hidden relative">
                          {activeTab === 'console' && (
                              <div className="h-full">
                                  <Terminal logs={logs} isProcessing={isProcessing} />
                              </div>
                          )}
                          
                          {activeTab === 'preview' && (
                               <div className="h-full flex flex-col bg-nexus-900">
                                  {generatedCode ? (
                                      <textarea 
                                          className="flex-1 w-full h-full p-4 bg-nexus-900 text-blue-300 font-mono text-xs outline-none border-none resize-none"
                                          value={generatedCode}
                                          onChange={(e) => {
                                              setGeneratedCode(e.target.value);
                                              setFileContent(e.target.value);
                                          }}
                                          spellCheck={false}
                                      />
                                  ) : (
                                      <div className="h-full flex items-center justify-center text-gray-600 italic">
                                          No text content.
                                      </div>
                                  )}
                              </div>
                          )}

                          {activeTab === 'hex' && (
                              <div className="h-full p-4 overflow-auto font-mono text-xs text-nexus-accent bg-black">
                                  <pre className="whitespace-pre-wrap tracking-wider leading-relaxed opacity-80">
                                      {hexDump || "No binary file loaded."}
                                  </pre>
                              </div>
                          )}
                      </div>
                  </div>
              </div>

            </div>
          </div>
        );
      };

      const App = () => {
        const [currentView, setCurrentView] = useState(AppView.DASHBOARD);
        const [mods, setMods] = useState(INITIAL_MODS);
        const [selectedFile, setSelectedFile] = useState(null);

        const toggleMod = (id) => {
          setMods(prev => prev.map(m => m.id === id ? { ...m, active: !m.active } : m));
        };

        const updateMod = (id, updates) => {
            setMods(prev => prev.map(m => m.id === id ? { ...m, ...updates } : m));
        }

        const renderContent = () => {
          switch (currentView) {
            case AppView.DASHBOARD:
              return (
                <Dashboard 
                  mods={mods} 
                  onToggleMod={toggleMod}
                  updateMod={updateMod}
                  selectedFile={selectedFile}
                  onFileSelect={setSelectedFile}
                />
              );
            case AppView.EDITOR:
              return (
                <div className="p-8 max-w-4xl mx-auto w-full h-full overflow-y-auto">
                    <h2 className="text-2xl font-bold mb-6 flex items-center gap-3 text-white">
                        <FileCode className="text-nexus-accent" />
                        Patch Editor Configuration
                    </h2>
                    
                    {!selectedFile ? (
                        <div className="text-center p-12 bg-nexus-800 rounded-xl border border-nexus-700 border-dashed">
                            <p className="text-gray-400 mb-4">No active file context.</p>
                            <button 
                                onClick={() => setCurrentView(AppView.DASHBOARD)}
                                className="px-6 py-2 bg-nexus-700 text-nexus-accent rounded-lg hover:bg-nexus-600 transition-colors"
                            >
                                Select a file in Dashboard
                            </button>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            <div className="bg-nexus-800 p-6 rounded-xl border border-nexus-700 shadow-lg">
                                 <p className="text-xs text-gray-500 uppercase tracking-widest mb-2 font-bold">Target Binary</p>
                                 <p className="text-2xl font-mono text-white tracking-tight">{selectedFile.name}</p>
                                 <p className="text-sm text-gray-400 mt-1">{selectedFile.size} • {selectedFile.type.split('/').pop()?.toUpperCase() || 'UNKNOWN'}</p>
                            </div>

                            <div className="animate-fade-in-up">
                                <h3 className="text-lg font-semibold mb-4 text-gray-300 border-b border-nexus-700 pb-2">Active Modules</h3>
                                <div className="space-y-3">
                                    {mods.filter(m => m.active).length === 0 ? (
                                         <div className="p-6 bg-nexus-900/50 rounded-lg border border-nexus-700/50 text-gray-500 italic text-center">
                                           No modifications enabled. Enable them in the Dashboard to configure parameters.
                                         </div>
                                    ) : (
                                        mods.filter(m => m.active).map(mod => (
                                            <div key={mod.id} className="bg-nexus-800 border-l-4 border-nexus-accent p-5 rounded-r-lg shadow-md transition-all hover:bg-nexus-700/80">
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="font-bold text-nexus-accent text-lg">{mod.name}</span>
                                                    <span className="text-[10px] font-bold bg-nexus-900 text-gray-400 px-2 py-1 rounded border border-nexus-700 uppercase tracking-wider">{mod.category}</span>
                                                </div>
                                                <p className="text-sm text-gray-300 leading-relaxed font-mono opacity-90">
                                                    {mod.description}
                                                </p>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
              );
            case AppView.STORE:
              return (
                <div className="flex flex-col items-center justify-center h-full text-gray-400 space-y-4">
                  <div className="p-6 bg-nexus-800 rounded-full">
                      <ShoppingCart size={48} className="text-nexus-accent" />
                  </div>
                  <h2 className="text-2xl font-bold text-white">Mod Store Offline</h2>
                  <p>Connect to Nexus Network to browse community mods.</p>
                </div>
              );
            case AppView.SETTINGS:
              return (
                <div className="flex flex-col items-center justify-center h-full text-gray-400 space-y-4">
                   <div className="p-6 bg-nexus-800 rounded-full">
                      <Wrench size={48} className="text-purple-400" />
                  </div>
                  <h2 className="text-2xl font-bold text-white">Settings</h2>
                  <p>System configuration unavailable in demo mode.</p>
                </div>
              );
            default:
              return null;
          }
        };

        return (
          <div className="flex h-screen bg-nexus-900 text-gray-200 overflow-hidden font-sans selection:bg-nexus-accent selection:text-nexus-900">
            <Sidebar 
              currentView={currentView} 
              onChangeView={setCurrentView}
            />
            
            <main className="flex-1 h-full bg-[#050508] relative">
              <div className="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none"></div>
              <div className="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-[#050508] pointer-events-none"></div>
              
              <div className="relative h-full z-10">
                {renderContent()}
              </div>
            </main>
          </div>
        );
      };

      const rootElement = document.getElementById('root');
      if (!rootElement) {
        throw new Error("Could not find root element to mount to");
      }

      const root = ReactDOM.createRoot(rootElement);
      root.render(
        <React.StrictMode>
          <App />
        </React.StrictMode>
      );
    </script>
</body>
</html>
